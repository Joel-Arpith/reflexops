version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: reflexops-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - GENERIC_TIMEZONE=UTC
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/data/workflows # Preload workflows
    networks:
      - reflexops-net
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: reflexops-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - reflexops-net
    tty: true

networks:
  reflexops-net:
    driver: bridge

volumes:
  n8n_data:
  ollama_data:
